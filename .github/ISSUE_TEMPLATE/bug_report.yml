name: Bug report
description: Report a reproducible defect in the app or build pipeline
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Short description of the issue
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include an exact sequence
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version or commit SHA
      placeholder: v1.1.6 or abc1234
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: arch
    attributes:
      label: Architecture
      placeholder: arm64, x64
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or extra context
      render: shell
