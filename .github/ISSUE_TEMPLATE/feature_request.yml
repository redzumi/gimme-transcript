name: Feature request
description: Suggest a focused improvement that fits the project scope
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the idea
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope fit
      description: Explain how this fits the current spec and non-goals
      placeholder: If this touches non-goals like cloud sync or automatic diarization, say so explicitly.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
